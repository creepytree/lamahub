name: build-push-public
on: [push]

jobs:
  dockerhub:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write   # needed to delete old workflow runs
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/${{ github.event.repository.name }}:latest

      - uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USER }}/${{ github.event.repository.name }}
          readme-filepath: ./README.md

      - name: Prune old workflow runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate \
            "repos/${{ github.repository }}/actions/workflows/build-push.yml/runs" \
            -q '.workflow_runs[] | select(.id != ${{ github.run_id }}) | .id' \
          | while read -r id; do
              echo "Deleting run $id"
              gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$id"
            done